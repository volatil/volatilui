<!DOCTYPE html>
<html lang="es">
	<head>

		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">

		<!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous"> -->
		<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>

		<title>Drop</title>

		<style type="text/css">
			body {
				font-family: Arial, Helvetica, sans-serif;
			}
		</style>

		<script src="volatilui.js"></script>
	</head>
	<body>
		<br><br><br><br>
		<section class="ejemplos">
			<table>
				<thead>
					<tr>
						<td>
							<h2>Dropdown</h2>
						</td>
					</tr>
				</thead>
				<tbody>
					<tr>
						<td>Pizza</td>
						<td>
							<div class="losingredientes"></div>

							<script type="text/javascript">
								const data = ["Masa", "Queso", "Choclito", "Salsa de tomate"];
								dropdown({ donde: ".losingredientes", id:"deporte0117", valorinicial: "Ingredientes de pizza", options: data });
							</script>
						</td>
					</tr>
				</tbody>
			</table>
			<table>
				<thead>
					<tr>
						<td>
							<h2>Tooltip</h2>
						</td>
					</tr>
				</thead>
				<tbody>
					<tr>
						<td>Coloca el mouse</td>
						<td>
							<div class="eltooltip"></div>

							<script type="text/javascript">
								tooltip({
									donde: ".eltooltip",
									id: "algo1353" ,
									direccion: "derecha" ,
									mensaje: "sobre mi" ,
									mensajetooltip: "pizza piña" ,
								});
							</script>
						</td>
					</tr>
					<tr>
						<td>testssssssssss</td>
						<td>
							<div id="soyejemplo"></div>

							<script type="text/javascript">
								tooltip({
									donde: "#soyejemplo" ,
									id: "agua1429" ,
									direccion: "abajo" ,
									mensaje: "soy el test UNO" ,
									mensajetooltip: "soy el test DOS" ,
								})
							</script>
						</td>
					</tr>
				</tbody>
			</table>
		</section>
	</body>
</html>
